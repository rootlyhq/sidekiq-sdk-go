version: "2"

run:
  timeout: 5m

output:
  formats:
    colored-line-number: {}

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/rootlyhq/sidekiq-sdk-go

linters:
  default: none
  enable:
    - bodyclose
    - gocritic
    - gocyclo
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gocyclo:
      min-complexity: 25
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - unparam
      - path: internal/testdata/
        linters:
          - unused
